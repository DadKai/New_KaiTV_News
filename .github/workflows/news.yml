name: Generate Daily News MP3

on:
  schedule:
    - cron: "0 14 * * *"  # every day at 7 AM PST (UTC time)
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Checkout repo
        uses: actions/checkout@v4

      - name: 2. Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 3. Install dependencies
        run: |
          pip install -r requirements.txt

      - name: 4. Run your script
        run: |
          python KaiTVPodcast.py

      - name: 5. Commit and push MP3
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add *.mp3
          git commit -m "Auto-generated daily news MP3" || echo "No changes"
          git push
